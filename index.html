<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>JoinUP Test</title>
<style>
body{
    font-family:Arial;
    margin:40px;
}
button{
    padding:10px 20px;
    font-size:18px;
}
pre{
    white-space:pre-wrap;
    border:1px solid #ccc;
    padding:10px;
    margin-top:20px;
}
</style>
</head>
<body>

<h2>Проверка JoinUP API</h2>

<button onclick="load()">Получить страны</button>

<pre id="result"></pre>

<script>

async function load(){

    const result=document.getElementById("result");

    result.textContent="Загрузка...";

    try{

        const response=await fetch(
        "https://joinup.ua/api/main/tour/regions?lang=uk&currency=UAH");

        result.textContent=
        "HTTP: "+response.status+"\n\n";

        const text=await response.text();

        result.textContent+=text;

    }
    catch(e){

        result.textContent=e;

    }

}

</script>

</body>
</html>
